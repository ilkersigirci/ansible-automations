---
- name: Setup LXC Debian Hosts
  hosts: lxcs
  become: true
  vars:
    ansible_user: root

  roles:
    - role: common
    - role: docker_install
    - role: dotfiles_shell

- name: Setup RPI Debian Hosts
  hosts: rpis
  become: true

  roles:
    - role: common
    - role: docker_install
    - role: dotfiles_shell

- name: Setup Oracle Ubuntu Hosts
  hosts: oracle_ubuntu
  become: true

  roles:
    - role: common
    - role: docker_install
    - role: dotfiles_shell
